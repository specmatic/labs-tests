name: Specmatic Labs Tests

on:
  workflow_dispatch:
    inputs:
      labs:
        description: "Optional space-separated list of labs to run, for example: api-coverage data-adapters"
        required: false
        type: string
      labs_branch:
        description: "Optional branch of specmatic/labs to refresh before running. Defaults to auto-labs-tests."
        required: false
        default: "auto-labs-tests"
        type: string
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  run-labs:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SPECMATIC_LICENSE_KEY: ${{ secrets.SPECMATIC_LICENSE_KEY }}
      DEFAULT_README_DRIVEN_LABS: >-
        api-coverage
        api-security-schemes
        mcp-auto-test
        quick-start-api-testing
        quick-start-async-contract-testing
        continuous-integration
        data-adapters
        dictionary
        kafka-sqs-retry-dlq
        quick-start-contract-testing
        schema-resiliency-testing
        workflow-in-same-spec
      
    steps:
      - name: Check out labs-tests
        uses: actions/checkout@v6
        with:
          fetch-depth: 3

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Prepare temporary Specmatic license file
        if: env.SPECMATIC_LICENSE_KEY != ''
        shell: bash
        run: |
          mkdir -p temp
          printf '%s\n' "${SPECMATIC_LICENSE_KEY}" > temp/github-actions-license.txt

      - name: Run README-driven lab harnesses
        id: run_labs
        shell: bash
        env:
          WORKFLOW_LABS_INPUT: ${{ github.event.inputs.labs || '' }}
          EFFECTIVE_LABS_BRANCH: ${{ github.event.inputs.labs_branch || 'auto-labs-tests' }}
        timeout-minutes: 60
        run: |
          set +e
          echo "[config] workflow event: ${GITHUB_EVENT_NAME}"
          echo "[config] effective labs branch: '${EFFECTIVE_LABS_BRANCH}'"
          echo "[config] selected labs input: '${WORKFLOW_LABS_INPUT}'"
          start_time=$(date +%s)
          run_command=(python3 -u run_all_labs.py --refresh-labs --force --labs-branch "${EFFECTIVE_LABS_BRANCH}")
          echo "[config] executing: ${run_command[*]}"
          effective_labs_input="${WORKFLOW_LABS_INPUT}"
          if [[ -z "${effective_labs_input}" ]]; then
            effective_labs_input="${DEFAULT_README_DRIVEN_LABS}"
            echo "[config] no labs input provided; using default README-driven lab batch"
          fi
          read -r -a selected_labs <<< "${effective_labs_input}"
          run_command+=(--labs "${selected_labs[@]}")
          echo "[config] labs filter: ${selected_labs[*]}"
          "${run_command[@]}" &
          run_pid=$!

          while kill -0 "$run_pid" 2>/dev/null; do
            now=$(date +%s)
            elapsed=$((now - start_time))
            minutes=$((elapsed / 60))
            seconds=$((elapsed % 60))
            echo "[heartbeat] run_all_labs.py still running after ${minutes}m ${seconds}s"
            sleep 60
          done

          wait "$run_pid"
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build GitHub summary
        if: always()
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          report_candidates = [
              Path("output/consolidated-report/consolidated-report.json"),
              Path("output/consolidated-report.json"),
          ]
          report_path = next((path for path in report_candidates if path.exists()), None)
          comparison_path = Path("output/consolidated-report/labs-comparison.html")

          if report_path is None:
              print("## Specmatic Labs Tests")
              print("")
              print("[error] The consolidated report was not generated.")
              print("")
              print("Impact: the GitHub Actions job summary cannot show lab results without the consolidated JSON payload.")
              print("")
              print("[Action required]")
              print("") 
              print("Inspect the run_all_labs.py logs above and confirm that output/consolidated-report/consolidated-report.json is created before the summary step runs.")
              raise SystemExit(0)

          payload = json.loads(report_path.read_text(encoding="utf-8"))
          environment = payload.get("environment", {})
          summary = {item["label"]: item["value"] for item in payload.get("summary", [])}
          setup = payload.get("setup") or {}

          print("## Specmatic Labs Tests")
          print("")
          print(f"- Status: **{payload.get('status', 'unknown').upper()}**")
          print(f"- Specmatic: `{environment.get('specmaticVersion', 'n/a')}`")
          print(f"- Labs branch requested: `{environment.get('labsBranchRequested', setup.get('labsBranch', 'n/a'))}`")
          print(f"- Labs git ref: `{environment.get('labsGitRef', 'n/a')}`")
          print(f"- Setup: `{setup.get('status', 'n/a')}`")
          print(f"- Labs discovered: `{summary.get('Labs discovered', 0)}`")
          print(f"- Labs passed: `{summary.get('Labs passed', 0)}`")
          print(f"- Labs failed: `{summary.get('Labs failed', 0)}`")
          print(f"- Consolidated report JSON: `{report_path.as_posix()}`")
          print(f"- Comparison report HTML: `{comparison_path.as_posix()}`" if comparison_path.exists() else "- Comparison report HTML: `not generated`")
          print("- Reports artifact: `specmatic-labs-reports`")
          print("")
          print("| Lab | Status | Time (s) | Exit Code | Failures | Total tests |")
          print("| --- | --- | ---: | ---: | ---: | ---: |")
          for lab in payload.get("labs", []):
              status = lab.get("status", "unknown")
              status_symbol = "✅" if status == "passed" else "❌" if status == "failed" else status
              failures = "n/a"
              validations = "n/a"
              for item in lab.get("summary", []):
                  if item.get("label") == "Failures":
                      failures = item.get("value", "n/a")
                  if item.get("label") == "Validations":
                      validations = item.get("value", "n/a")
              print(
                  f"| {lab.get('name', 'unknown')} | {status_symbol} | "
                  f"{lab.get('durationSeconds', 'n/a')} | {lab.get('exitCode', 'n/a')} | "
                  f"{failures} | {validations} |"
              )
          PY

      - name: Upload generated reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: specmatic-labs-reports
          if-no-files-found: error
          path: output/

      - name: Fail workflow when any lab fails
        if: steps.run_labs.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "One or more lab harnesses failed. See the consolidated summary and uploaded reports artifact."
          exit 1
